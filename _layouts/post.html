<div class="post-container">
  <aside class="post-sidebar">
    
    <div class="sidebar-section tags-section">
      <h3>Argomenti</h3>
      <ul class="tag-list">
        {% for tag in page.tags %}
          <li><a href="/tags#{{ tag | slugify }}">{{ tag }}</a></li>
        {% endfor %}
      </ul>
    </div>

    <div class="sidebar-section books-section">
      <h3>Letture Consigliate</h3>
      <div class="book-item">
        <a href="URL_AMAZON" target="_blank">
          <img src="/assets/img/books/java-clean-code.jpg" alt="Clean Code">
          <span>Clean Code (Robert Martin)</span>
        </a>
      </div>
      </div>

  </aside>

  <article class="post-content">
    {{ content }}
  </article>
</div>
